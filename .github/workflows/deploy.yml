name: Deploy

on:
  workflow_dispatch:
    inputs:
      event:
        description: 'Event to deploy'
        required: true
        type: choice
        options:
          - all
          - pgc
          - wagc
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - prod

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run tsc

  deploy:
    needs: check
    runs-on: ubuntu-latest
    if: ${{ inputs.event == 'all' || inputs.event == matrix.event }}
    strategy:
      matrix:
        event: [pgc, wagc]
    environment: ${{ matrix.event }}-${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build ${{ matrix.event }}
        run: npm run build:${{ matrix.event }}

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ vars.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ${{ vars.FTP_PATH }}
