name: Deploy PGC to FTP

on:
  workflow_dispatch:

jobs:
  deploy-pgc-prod:
    runs-on: ubuntu-latest
    environment: pgc-prod
    env:
      EVENT: pgc
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ vars.PGC_FTP_HOST }}
          username: ${{ secrets.PGC_FTP_USER }}
          password: ${{ secrets.PGC_FTP_PASS }}
          local-dir: ./out/
          server-dir: ${{ vars.PGC_FTP_PATH }}
