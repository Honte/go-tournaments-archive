name: Deploy

on:
  push:
    branches: [actions]
  workflow_dispatch:
    inputs:
      event:
        description: 'Event to deploy'
        required: true
        type: choice
        options:
          - all
          - pgc
          - wagc
      target:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - prod

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run tsc

  deploy-pgc:
    needs: check
    if: inputs.event == 'all' || inputs.event == 'pgc'
    runs-on: ubuntu-latest
    environment: pgc-${{ inputs.target || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build pgc
        run: npm run build:pgc

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ vars.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./out/
          server-dir: ${{ vars.FTP_PATH }}

  deploy-wagc:
    needs: check
    if: inputs.event == 'all' || inputs.event == 'wagc' || github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: wagc-${{ inputs.target || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build wagc
        run: npm run build:wagc

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ vars.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./out/
          server-dir: ${{ vars.FTP_PATH }}
